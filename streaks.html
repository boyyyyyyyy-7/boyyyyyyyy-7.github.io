        /* Base Styles — premium dark space aesthetic to match the rest of the site.

        body {

            pointer-events: none;
            z-index: 0;
            animation: streak-stars-drift 120s linear infinite;

            justify-content: center;

            border: 1px solid rgba(255, 255, 255, 0.04);

            border-color: rgba(255, 255, 255, 0.15);

        .day.weekend {
            background-color: rgba(255, 255, 255, 0.015);
            color: rgba(255, 255, 255, 0.35);

            box-shadow: 0 0 14px rgba(88, 204, 2, 0.25);

        }

        .day.used-freeze {
            background: linear-gradient(135deg, rgba(66, 135, 245, 0.40), rgba(40, 100, 200, 0.20)) !important;
            border: 1px solid rgba(120, 180, 255, 0.5) !important;
            color: #c8e0ff !important;
            font-weight: 700;
            box-shadow: 0 0 14px rgba(66, 135, 245, 0.25);
            position: relative;
            z-index: 2;
        }

        .day.used-freeze::after {
            content: '❄';
            font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji', sans-serif;

            right: 3px;

            height: 18px;

            align-items: center;

            z-index: 6;
            pointer-events: none;
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.45));

        .day.today {
            border: 2px solid #4ecdc4 !important;
            box-shadow: 0 0 18px rgba(78, 205, 196, 0.5), 0 0 0 1px rgba(78, 205, 196, 0.3) inset;
            animation: today-pulse 2.4s ease-in-out infinite;
        }

        @keyframes today-pulse {
            0%, 100% { box-shadow: 0 0 14px rgba(78, 205, 196, 0.4), 0 0 0 1px rgba(78, 205, 196, 0.3) inset; }
            50%      { box-shadow: 0 0 24px rgba(78, 205, 196, 0.7), 0 0 0 1px rgba(78, 205, 196, 0.5) inset; }
        }

        .day.other-month {
            opacity: 0.25;
        }

        .monday-dot {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 6px;
            height: 6px;
            background-color: #ff4d4d;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.3);
        }

        /* Show tooltip on day hover */
        .is-monday {
            position: relative;
            cursor: help;
        }

        .is-monday:hover {
            z-index: 6;
        }

        .is-monday::before {
            content: '+1 Freeze';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
            pointer-events: none;
            z-index: 20;
        }

        .is-monday:hover::before {
            opacity: 1;
            visibility: visible;
        }

        /* Monday Badge */
        .monday-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: #ff4d4d;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            animation: pulse 2s infinite;
            cursor: pointer;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(0.9);
            }
        }

/* Temp Menu */

<body>

    <script>
        /* ===================================================================
           STREAK PAGE — display-only script
           All streak computation and storage is handled by window.StreakEngine
           (loaded from background-loader.js before this page's scripts run).
           This script only handles the calendar UI and page display.
           =================================================================== */

        // --- DOM refs ---
        const closeButton       = document.getElementById('closeButton');
        const mainStreakCount   = document.getElementById('mainStreakCount');
        const monthYear         = document.getElementById('monthYear');
        const prevMonthBtn      = document.getElementById('prevMonth');
        const nextMonthBtn      = document.getElementById('nextMonth');
        const calendarDays      = document.getElementById('calendarDays');
        const headerFreezeCount = document.getElementById('headerFreezeCount');
        const freezeCount       = document.getElementById('freezeCount');
        const bestStreak        = document.getElementById('bestStreak');
        const todayStatus       = document.getElementById('todayStatus');
        const toast             = document.getElementById('toast');

        // Calendar navigation state
        let currentDate  = new Date();
        let currentYear  = currentDate.getFullYear();
        let currentMonth = currentDate.getMonth();

        // --- Date helpers (used for calendar rendering only) ---

        function normalizeToNoon(date) {
            const d = new Date(date);
            d.setHours(12, 0, 0, 0);
            return d;
        }

        function toDayKey(date) {
            const d = normalizeToNoon(date);
            const y   = d.getFullYear();
            const m   = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function parseDayKey(key) {
            if (!key) return null;
            if (/^\d{4}-\d{2}-\d{2}$/.test(key)) {
                const d = new Date(`${key}T12:00:00`);
                return Number.isNaN(d.getTime()) ? null : normalizeToNoon(d);
            }
            const legacy = new Date(key);
            return Number.isNaN(legacy.getTime()) ? null : normalizeToNoon(legacy);
        }

        function normalizeDayKey(value) {
            const parsed = parseDayKey(value);
            return parsed ? toDayKey(parsed) : null;
        }

        function getDayDiff(a, b) {
            const msPerDay = 1000 * 60 * 60 * 24;
            return Math.round((normalizeToNoon(b) - normalizeToNoon(a)) / msPerDay);
        }

        function showToast(message) {
            if (!toast) return;
            toast.textContent = message;
            toast.classList.add('active');
            window.setTimeout(() => toast.classList.remove('active'), 3500);
        }

        /* computeEffectiveUsedSet — forward-walking simulation used exclusively
           for calendar rendering to determine which past days should show as
           freeze-protected (blue). Walks from the earliest visit up to today,
           auto-consuming freezes on missed weekdays inside an active streak.
           Returns a Set of YYYY-MM-DD strings for freeze-covered days.           */
        function computeEffectiveUsedSet(data, date) {
            const today = normalizeToNoon(date || new Date());
            const visitsSet     = new Set((data.visits     || []).map(normalizeDayKey).filter(Boolean));
            const originalUsed  = new Set((data.usedFreezes|| []).map(normalizeDayKey).filter(Boolean));

            // Collect all known activity dates that are not in the future
            let allDates = [...(data.visits || []), ...(data.usedFreezes || [])]
                .map(k => parseDayKey(k))
                .filter(d => d && d <= today);
            if (allDates.length === 0) return new Set();

            allDates.sort((a, b) => a - b);
            const firstDate  = allDates[0];
            const startLimit = new Date(today);
            startLimit.setDate(today.getDate() - 365);

            // Start from whichever is earlier: the user's first activity or 365 days ago
            let cursor = normalizeToNoon(firstDate < startLimit ? firstDate : startLimit);

            // Available freezes = current stock + ones already consumed (they may be re-validated)
            let available   = Math.max(0, Number(data.freezes) || 0) + originalUsed.size;
            const effective = new Set();
            let streakActive = false;

            while (cursor <= today) {
                const key       = toDayKey(cursor);
                const isWeekend = cursor.getDay() === 0 || cursor.getDay() === 6;
                const hasVisit  = visitsSet.has(key);
                const hasUsed   = originalUsed.has(key);

                if (hasVisit) {
                    // Visited — streak is alive
                    streakActive = true;
                } else if (!isWeekend && streakActive) {
                    // Missed weekday inside an active streak — try to cover it
                    if (hasUsed || available > 0) {
                        effective.add(key);
                        available = Math.max(0, available - 1);
                    } else {
                        // No freeze available — streak breaks
                        streakActive = false;
                    }
                } else if (!isWeekend) {
                    // Missed weekday before the streak started — reset
                    streakActive = false;
                }
                // Weekends: no action either way

                cursor.setDate(cursor.getDate() + 1);
                cursor.setHours(12, 0, 0, 0);
            }

            return effective;
        }

        /* updateCalendar — renders the month grid using data from StreakEngine. */
        function updateCalendar(data) {
            const MONTHS = ['January','February','March','April','May','June',
                            'July','August','September','October','November','December'];
            monthYear.textContent  = `${MONTHS[currentMonth]} ${currentYear}`;
            calendarDays.innerHTML = '';

            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const firstDay    = new Date(currentYear, currentMonth, 1).getDay();

            // Empty cells before the 1st
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day other-month';
                calendarDays.appendChild(empty);
            }

            const today    = normalizeToNoon(new Date());
            const todayKey = toDayKey(today);
            const visits   = new Set((data.visits      || []).map(normalizeDayKey).filter(Boolean));
            const used     = computeEffectiveUsedSet(data, today);

            for (let day = 1; day <= daysInMonth; day++) {
                const el      = document.createElement('div');
                el.className  = 'day';
                el.textContent = String(day);

                const dateKey = toDayKey(new Date(currentYear, currentMonth, day));
                const dateObj = normalizeToNoon(new Date(currentYear, currentMonth, day));
                const dow     = dateObj.getDay();

                // Monday gets a red dot and tooltip (Monday bonus freeze)
                if (dow === 1) {
                    el.classList.add('is-monday');
                    el.title = 'Monday - +1 Freeze';
                    const dot = document.createElement('div');
                    dot.className = 'monday-dot';
                    el.appendChild(dot);
                }

                if (dow === 0 || dow === 6) el.classList.add('weekend');
                if (dateKey === todayKey)    el.classList.add('today');

                if (visits.has(dateKey)) {
                    el.classList.add('practiced');
                } else if (used.has(dateKey)) {
                    el.classList.add('practiced', 'used-freeze');
                    el.title = 'Freeze used on this day';
                }

                calendarDays.appendChild(el);
            }
        }

        /* render — updates all streak display elements.
           Uses the streak value returned by StreakEngine.compute() — the same
           algorithm used on every game page — so the number is always consistent. */
        function render(data, streak) {
            mainStreakCount.textContent   = String(streak);
            bestStreak.textContent        = String(data.best    || 0);
            headerFreezeCount.textContent = String(data.freezes || 0);
            freezeCount.textContent       = String(data.freezes || 0);

            // Normalise today's key the same way StreakEngine does before comparing
            const todayKey    = toDayKey(new Date());
            const visitedToday = (data.visits || []).map(normalizeDayKey).includes(todayKey);

            if (visitedToday) {
                todayStatus.textContent = 'Today is counted ✓ (you visited)';
                todayStatus.classList.remove('broken');
            } else {
                todayStatus.textContent = 'Today is not counted yet — just open the site to count it!';
                todayStatus.classList.add('broken');
            }
        }

        function navigateToHome(e) {
            if (e) e.preventDefault();
            window.location.href = 'index.html';
            return false;
        }

        /* ===================================================================
           BOOT — background-loader.js registers its DOMContentLoaded first
           (it's a synchronous <script> in <head>), so by the time this fires
           syncStreak() has already run: today's visit is recorded and saved.
           We just load the result and display it.
           =================================================================== */
        document.addEventListener('DOMContentLoaded', () => {
            // Render the streak. Records today's visit too, so simply opening the
            // site counts — no game required (recordVisit is idempotent).
            function bootStreak() {
                let data = window.StreakEngine.load();
                data = window.StreakEngine.recordVisit(data);
                data = window.StreakEngine.consumeFreezesIfNeeded(data);
                const streak = window.StreakEngine.compute(data);
                data.best = Math.max(Number(data.best) || 0, streak);
                window.StreakEngine.save(data);
                render(data, streak);
                updateCalendar(data);
            }
            function streakFailed() {
                if (mainStreakCount) mainStreakCount.textContent = '–';
                if (todayStatus) {
                    todayStatus.textContent = 'Couldn’t load your streak — please refresh the page.';
                    todayStatus.classList.add('broken');
                }
            }
            try {
                if (!window.StreakEngine) throw new Error('StreakEngine not yet available');
                bootStreak();
            } catch (err) {
                console.error('Streak page display error:', err);
                // SELF-HEAL: the engine isn't loaded (an old/cached background-loader.js that
                // never exposed it, or a cached/blocked streak-engine.js). Pull a fresh,
                // cache-busted copy on demand and retry once — so the page recovers on its
                // own instead of getting stuck asking the user to refresh.
                if (!window.__streakRetried) {
                    window.__streakRetried = true;
                    const s = document.createElement('script');
                    s.src = 'streak-engine.js?fresh=' + Date.now();
                    s.onload  = () => { try { bootStreak(); } catch (e) { console.error(e); streakFailed(); } };
                    s.onerror = streakFailed;
                    document.head.appendChild(s);
                } else {
                    streakFailed();
                }
            }

            // Dev helper: call window.refreshStreak() in the console to redraw
            window.refreshStreak = () => {
                const data   = window.StreakEngine.load();
                const streak = window.StreakEngine.compute(data);
                render(data, streak);
                updateCalendar(data);
            };

            if (closeButton) closeButton.addEventListener('click', navigateToHome);

            if (prevMonthBtn) {
                prevMonthBtn.addEventListener('click', () => {
                    currentMonth -= 1;
                    if (currentMonth < 0) { currentMonth = 11; currentYear -= 1; }
                    updateCalendar(window.StreakEngine.load());
                });
            }

            if (nextMonthBtn) {
                nextMonthBtn.addEventListener('click', () => {
                    currentMonth += 1;
                    if (currentMonth > 11) { currentMonth = 0; currentYear += 1; }
                    updateCalendar(window.StreakEngine.load());
                });
            }
        });
    </script>
