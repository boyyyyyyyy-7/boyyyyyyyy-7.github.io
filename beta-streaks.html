    <title>Streak | Brayden is Tall Games</title>
    <link
        href="https://fonts.googleapis.com/css?family=Google+Sans:400,500|Roboto:300,400,500,700|Source+Code+Pro:400,700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #050508;
            --glass-bg: rgba(15, 15, 20, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.4);
            --accent: #a855f7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        @font-face {
            font-family: 'Inter';
            src: url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- MESH GRADIENT --- */
        #mesh-gradient {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #050508 100%);
            overflow: hidden;
        }

        .gradient-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite alternate;
        }

        .sphere-1 {
            width: 40vw;
            height: 40vw;
            background: var(--primary-glow);
            top: -10%;
            left: -10%;
        }

        .sphere-2 {
            width: 35vw;
            height: 35vw;
            background: rgba(168, 85, 247, 0.3);
            bottom: -5%;
            right: -5%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(10%, 10%) scale(1.1);
            }
        }

        /* --- PREMIUM HEADER --- */
        header.glass {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 16px 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-sizing: border-box;
        }

        .logo {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-close {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            font-size: 1.2rem;
        }

        .btn-close:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* --- PODS / CARDS --- */
        .glass-pod {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* --- HERO STATS --- */
        .page {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }

        .hero-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .hero-stat-large {
            grid-column: span 2;
            text-align: center;
        }

        .streak-val {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .streak-label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-top: 12px;
        }

        .mini-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .mini-stat .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .mini-stat .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        /* --- CALENDAR --- */
        .calendar-container {
            margin-top: 40px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .month-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .month-nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .month-nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .week-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 12px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.8rem;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
            cursor: default;
        }

        .day-cell.practiced {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .day-cell.freeze {
            background: rgba(168, 85, 247, 0.1);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
        }

        .day-cell.today {
            background: #fff;
            color: #000;
        }

        .day-cell.other-month {
            opacity: 0.2;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            background: rgba(10, 16, 24, 0.68);
            border-bottom: 1px solid rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 9000;
        }

        .topbar-title {
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: 0.3px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon-btn {
            appearance: none;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.10);
            transform: translateY(-1px);
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(66, 135, 245, 0.16);
            border: 1px solid rgba(66, 135, 245, 0.35);
            color: #e8f1ff;
            font-weight: 700;
            font-size: 0.95rem;
            position: relative;
            z-index: 9001;
        }

        .page {
            max-width: 980px;
            margin: 0 auto;
            padding: 110px 16px 40px;
        }

        .hero-card,
        .calendar-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.30);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            overflow: hidden;
        }

        .hero-card {
            padding: 18px 18px 14px;
            margin-bottom: 16px;
        }

        .hero-streak {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 10px;
            font-size: 56px;
            font-weight: 900;
            line-height: 1;
        }

        .hero-streak .flame {
            font-size: 38px;
        }

        .hero-sub {
            text-align: center;
            opacity: 0.80;
            margin-top: 6px;
            margin-bottom: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }

        .stat {
            background: rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 10px 12px;
        }

        .stat .label {
            font-size: 12px;
            opacity: 0.75;
            font-weight: 700;
            letter-spacing: 0.35px;
            text-transform: uppercase;
        }

        .stat .value {
            margin-top: 4px;
            font-size: 22px;
            font-weight: 900;
        }

        .today-status {
            background: rgba(88, 204, 2, 0.12);
            border: 1px solid rgba(88, 204, 2, 0.22);
            color: #d8ffd0;
            border-radius: 14px;
            padding: 10px 12px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
        }

        .rule {
            text-align: center;
            opacity: 0.78;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        /* NEW ADDITIONS FOR POLISH */
        .hero-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        /* --- PREMIUM BUTTONS --- */
        .btn-premium {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 32px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            border: 1px solid var(--glass-border);
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #0ea5e9);
            color: #000;
            box-shadow: 0 8px 32px var(--primary-glow);
        }

        .btn-primary:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px var(--primary-glow);
        }

        .btn-secondary {
            background: var(--glass-bg);
            color: #fff;
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* --- COLLECTION MODAL --- */
        .collection-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 24px;
        }

        .collection-container {
            width: 100%;
            max-width: 600px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 16px;
            margin-top: 32px;
        }

        .collection-item {
            aspect-ratio: 1;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .collection-item:hover {
            transform: translateY(-4px) scale(1.05);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .collection-item.locked {
            filter: grayscale(1);
            opacity: 0.4;
        }

        .collection-item.locked::after {
            content: '🔒';
            font-size: 1.5rem;
        }

        /* Impact Effects */
        .screen-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 10001;
        }

        .flash-anim {
            animation: flashEffect 0.5s ease-out;
        }

        @keyframes flashEffect {
            0% {
                opacity: 0.8;
            }

            100% {
                opacity: 0;
            }
        }

        .shake-anim {
            animation: screenShake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes screenShake {

            10%,
            90% {
                transform: translate3d(-2px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(4px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-8px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(8px, 0, 0);
            }
        }

        .dim-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9990;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .dim-overlay.active {
            opacity: 1;
        }

        .winner-pop {
            animation: winPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes winPop {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .calendar-card {
            padding: 14px;
        }

        .calendar {
            background: transparent;
            padding: 0;
            margin: 0;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
            opacity: 0.9;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
        }

        .dot.visit {
            background: #58CC02;
        }

        .dot.freeze {
            background: #4287f5;
        }

        .dot.today {
            background: #4ecdc4;
        }

        .day.today {
            border: 2px solid #4ecdc4;
        }

        /* Case Modal CSS */
        .case-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .case-container {
            width: 90%;
            max-width: 650px;
            background: linear-gradient(135deg, rgba(20, 25, 35, 0.98), rgba(15, 18, 25, 0.98));
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 215, 0, 0.1);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .case-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 60%);
            animation: slowRotate 15s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes slowRotate {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .case-container h2 {
            margin-top: 0;
            color: #FFD700;
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6), 0 0 30px rgba(255, 215, 0, 0.4);
        }

        .spinner-window {
            height: 140px;
            width: 100%;
            background: #080a0f;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            margin: 30px 0;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.9), 0 10px 20px rgba(0, 0, 0, 0.5);
            transform: translateZ(0);
            /* Hardware accel */
        }

        .spinner-window::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.8) 0%, transparent 20%, transparent 80%, rgba(0, 0, 0, 0.8) 100%);
            pointer-events: none;
            z-index: 5;
        }

        .spinner-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: #FFD700;
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 15px #FFD700, 0 0 30px #FFD700;
        }

        .spinner-items {
            display: flex;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            transition: transform 5s cubic-bezier(0.1, 0, 0, 1);
        }

        .spinner-item {
            width: 140px;
            height: 100%;
            flex-shrink: 0;
            border-right: 2px solid rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #fff;
            font-weight: 800;
            font-size: 14px;
            text-align: center;
            padding: 8px;
            box-sizing: border-box;
            background: #1a202c;
            text-transform: uppercase;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .item-rare {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 140, 0, 0.2) 100%);
        }

        .item-epic {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2) 0%, rgba(107, 33, 168, 0.2) 100%);
        }

        .item-common {
            background: linear-gradient(135deg, rgba(66, 135, 245, 0.2) 0%, rgba(26, 86, 184, 0.2) 100%);
        }

        .spinner-item-icon {
            font-size: 32px;
            margin-bottom: 5px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        }

        .case-btns {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .win-display {
            font-size: 1.8rem;
            color: #FFD700;
            margin-top: 15px;
            min-height: 45px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5), 0 0 20px rgba(255, 215, 0, 0.3);
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .win-display.show {
            opacity: 1;
            transform: scale(1);
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            background: rgba(10, 16, 24, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: #fff;
            padding: 10px 12px;
            border-radius: 14px;
            display: none;
            gap: 10px;
            align-items: center;
            font-weight: 800;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
            z-index: 6000;
        }

        .toast.active {
            display: inline-flex;
        }
    </style>
</head>

<body>
    <div id="mesh-gradient">
        <div class="gradient-sphere sphere-1"></div>
        <div class="gradient-sphere sphere-2"></div>
    </div>

    <script>
        const STORAGE_KEY_V2 = 'streakDataV2';
        const closeButton = document.getElementById('closeButton');
        const mainStreakCount = document.getElementById('mainStreakCount');
        const monthYear = document.getElementById('monthYear');
        const prevMonthBtn = document.getElementById('prevMonth');
        const nextMonthBtn = document.getElementById('nextMonth');
        const calendarDays = document.getElementById('calendarDays');
        const headerFreezeCount = document.getElementById('headerFreezeCount');
        const freezeCount = document.getElementById('freezeCount');
        const bestStreak = document.getElementById('bestStreak');
        const todayStatus = document.getElementById('todayStatus');
        const toast = document.getElementById('toast');
        const heroOpenBtn = document.getElementById('heroOpenBtn');
        const galleryBtn = document.getElementById('galleryBtn');
        const collectionModal = document.getElementById('collectionModal');
        const closeGalleryBtn = document.getElementById('closeGalleryBtn');
        const collectionGrid = document.getElementById('collectionGrid');
        const unlockCountSpan = document.getElementById('unlockCount');
        const dimOverlay = document.getElementById('dimOverlay');
        const screenFlash = document.getElementById('screenFlash');
        const caseContainer = document.getElementById('caseContainer');
        const caseHeader = document.getElementById('caseHeader');


        // --- GLOABL RENDERING FUNCTIONS ---
        // (Defined here at the top as window properties to ensure total visibility)
        window.render = function (data, streak) {
            console.log('📊 Rendering streak:', streak);
            if (mainStreakCount) mainStreakCount.textContent = String(streak);
            if (bestStreak) bestStreak.textContent = String(data.best || 0);

            let storedBetaCases = parseInt(localStorage.getItem('betaCases') || '0');
            let storedBetaEpicCases = parseInt(localStorage.getItem('betaEpicCases') || '0');

            const caseCountDisplay = document.getElementById('caseCountDisplay');
            const epicCaseCountDisplay = document.getElementById('epicCaseCountDisplay');
            const modalCaseCount = document.getElementById('modalCaseCount');
            const modalEpicCount = document.getElementById('modalEpicCount');

            if (caseCountDisplay) caseCountDisplay.textContent = storedBetaCases;
            if (modalCaseCount) modalCaseCount.textContent = storedBetaCases;
            if (modalEpicCount) modalEpicCount.textContent = storedBetaEpicCases;

            if (heroOpenBtn) {
                if (storedBetaCases > 0 || storedBetaEpicCases > 0) {
                    heroOpenBtn.style.display = 'flex';
                    heroOpenBtn.classList.add('pulse');
                } else {
                    heroOpenBtn.style.display = 'none';
                }
            }

            if (epicCaseCountDisplay) {
                if (storedBetaEpicCases > 0) {
                    epicCaseCountDisplay.textContent = `${storedBetaEpicCases} 🌟`;
                    epicCaseCountDisplay.style.display = 'inline';
                } else {
                    epicCaseCountDisplay.style.display = 'none';
                }
            }

            if (todayStatus) {
                const today = normalizeToNoon(new Date());
                const todayKey = toDayKey(today);
                const hasVisit = (data.visits || []).some(v => normalizeDayKey(v) === todayKey);
                if (hasVisit) {
                    todayStatus.innerHTML = '<span style="color: var(--primary);">✦</span> Visited today — streak is safe!';
                    todayStatus.style.background = 'rgba(56, 189, 248, 0.05)';
                    todayStatus.style.borderColor = 'rgba(56, 189, 248, 0.2)';
                    todayStatus.style.color = 'var(--text-main)';
                } else {
                    todayStatus.innerHTML = '<span style="color: #ef4444;">✦</span> Haven\'t visited today yet';
                    todayStatus.style.background = 'rgba(239, 68, 68, 0.05)';
                    todayStatus.style.borderColor = 'rgba(239, 68, 68, 0.2)';
                    todayStatus.style.color = 'var(--text-main)';
                }
            }
        };

        window.updateCalendar = function (data) {
            console.log('📅 Updating calendar...');
            if (!calendarDays || !monthYear) return;

            const visitSet = new Set((data.visits || []).map(normalizeDayKey).filter(Boolean));
            const result = computeEffectiveUsedSet(data, new Date());
            const effectiveUsed = result.set;

            const now = new Date();
            const year = currentYear;
            const month = currentMonth;

            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                'July', 'August', 'September', 'October', 'November', 'December'];
            monthYear.textContent = `${monthNames[month]} ${year}`;

            const todayKey = toDayKey(normalizeToNoon(now));

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrev = new Date(year, month, 0).getDate();

            calendarDays.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                const d = document.createElement('div');
                d.className = 'day other-month';
                d.textContent = String(daysInPrev - firstDay + 1 + i);
                calendarDays.appendChild(d);
            }

            for (let date = 1; date <= daysInMonth; date++) {
                const d = document.createElement('div');
                d.className = 'day';
                const dayDate = new Date(year, month, date, 12, 0, 0, 0);
                const dow = dayDate.getDay();
                const key = toDayKey(dayDate);

                if (dow === 0 || dow === 6) d.classList.add('weekend');
                if (key === todayKey) d.classList.add('today');

                if (visitSet.has(key)) {
                    d.classList.add('practiced');
                } else if (effectiveUsed.has(key)) {
                    d.classList.add('used-freeze');
                }

                if (dow === 1) {
                    d.classList.add('is-monday');
                    const dot = document.createElement('span');
                    dot.className = 'monday-dot';
                    d.appendChild(dot);
                }

                // Add Case Tooltips
                if (date === daysInMonth) {
                    d.title = "+ 1 epic cace 🌟";
                    d.style.boxShadow = "inset 0 0 10px rgba(168, 85, 247, 0.4)";
                } else if (dow === 5) {
                    d.title = "+ 1 comon cace 🎁";
                    d.style.boxShadow = "inset 0 0 5px rgba(255, 215, 0, 0.3)";
                }

                d.appendChild(document.createTextNode(String(date)));
                calendarDays.appendChild(d);
            }

            const totalCells = firstDay + daysInMonth;
            const remainder = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= remainder; i++) {
                const d = document.createElement('div');
                d.className = 'day other-month';
                d.textContent = String(i);
                calendarDays.appendChild(d);
            }
        };

        let currentDate = new Date();
        let currentYear = currentDate.getFullYear();
        let currentMonth = currentDate.getMonth();

        let lastSaveTime = 0;
        const SAVE_COOLDOWN = 1000;


        function isRateLimited() {
            const now = Date.now();
            if (now - lastSaveTime < SAVE_COOLDOWN) {
                return true;
            }
            lastSaveTime = now;
            return false;
        }

        function detectSuspiciousActivity(data) {
            const currentStreak = computeStreak(data, new Date()).streak;
            if (currentStreak > 500) {
                return true;
            }

            if (data.freezes > 100) {
                return true;
            }

            return false;
        }

        function normalizeToNoon(date) {
            const d = new Date(date);
            d.setHours(12, 0, 0, 0);
            return d;
        }

        function toDayKey(date) {
            const d = normalizeToNoon(date);
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function parseDayKey(key) {
            if (!key) return null;
            if (/^\d{4}-\d{2}-\d{2}$/.test(key)) {
                const d = new Date(`${key}T12:00:00`);
                return Number.isNaN(d.getTime()) ? null : normalizeToNoon(d);
            }
            const legacy = new Date(key);
            return Number.isNaN(legacy.getTime()) ? null : normalizeToNoon(legacy);
        }

        function normalizeDayKey(value) {
            const parsed = parseDayKey(value);
            return parsed ? toDayKey(parsed) : null;
        }

        function getDayDiff(a, b) {
            const msPerDay = 1000 * 60 * 60 * 24;
            const start = normalizeToNoon(a);
            const end = normalizeToNoon(b);
            return Math.round((end - start) / msPerDay);
        }

        function getWeekKey(date) {
            const d = normalizeToNoon(date);
            const day = d.getDay();
            const diffToMonday = (day + 6) % 7;
            const monday = new Date(d);
            monday.setDate(d.getDate() - diffToMonday);
            monday.setHours(12, 0, 0, 0);
            return toDayKey(monday);
        }

        function showToast(message) {
            if (!toast) return;
            toast.textContent = message;
            toast.classList.add('active');
            window.setTimeout(() => toast.classList.remove('active'), 3500);
        }

        function mergeDayKeys(existing, add) {
            const set = new Set((existing || []).map(normalizeDayKey).filter(Boolean));
            const incoming = Array.isArray(add) ? add : [add];
            incoming.map(normalizeDayKey).filter(Boolean).forEach(k => set.add(k));
            return Array.from(set).sort();
        }

        const XOR_KEY = "StreakSecure2024!@#$%^&*()_+-=[]{}|;:,.<>?";

        function xorCrypt(text, key) {
            let result = '';
            for (let i = 0; i < text.length; i++) {
                const textChar = text.charCodeAt(i);
                const keyChar = key.charCodeAt(i % key.length);
                result += String.fromCharCode(textChar ^ keyChar);
            }
            return result;
        }

        function getDeviceFingerprint() {
            const fingerprint = [
                navigator.userAgent,
                navigator.language,
                screen.width + 'x' + screen.height,
                new Date().getTimezoneOffset(),
                navigator.platform
            ].join('|');

            let hash = 0;
            for (let i = 0; i < fingerprint.length; i++) {
                const char = fingerprint.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString();
        }

        function getRollingSeed() {
            const now = new Date();
            const dateStr = now.toISOString().split('T')[0];
            const deviceId = getDeviceFingerprint();

            let seed = 0;
            const seedStr = dateStr + deviceId;
            for (let i = 0; i < seedStr.length; i++) {
                seed += seedStr.charCodeAt(i) * (i + 1);
            }
            return seed;
        }

        function generateChecksum(data) {
            const seed = getRollingSeed();
            const str = JSON.stringify({
                visits: data.visits,
                freezes: data.freezes,
                usedFreezes: data.usedFreezes,
                lastFreezeWeek: data.lastFreezeWeek,
                best: data.best
            });

            let hash = seed;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }

            return seed.toString() + '_' + hash.toString();
        }

        function validateChecksum(data, storedChecksum) {
            if (!storedChecksum || !storedChecksum.includes('_')) return false;

            const [storedSeed, storedHash] = storedChecksum.split('_');
            const currentSeed = getRollingSeed();

            if (parseInt(storedSeed) !== currentSeed) return false;

            const expectedHash = generateChecksum(data).split('_')[1];
            return storedHash === expectedHash;
        }

        function validateStreakData(data) {
            if (data.freezes < 0 || data.freezes > 1000) return false;
            if (data.best < 0 || data.best > 10000) return false;
            if (!Array.isArray(data.visits) || !Array.isArray(data.usedFreezes)) return false;

            const visitSet = new Set(data.visits);
            if (visitSet.size !== data.visits.length) return false;

            const now = new Date();
            const maxFutureDays = 1;
            for (const visit of data.visits) {
                try {
                    const visitDate = parseDayKey(visit);
                    if (!visitDate) return false;
                    if (visitDate > new Date(now.getTime() + maxFutureDays * 24 * 60 * 60 * 1000)) return false;
                } catch {
                    return false;
                }
            }

            for (const freeze of data.usedFreezes) {
                try {
                    const freezeDate = parseDayKey(freeze);
                    if (!freezeDate) return false;
                } catch {
                    return false;
                }
            }

            return true;
        }


        function loadV2() {
            let parsed = null;
            try {
                console.log('Attempting to load streak data V2...');
                const stored = localStorage.getItem(STORAGE_KEY_V2);
                if (stored) {
                    console.log('Stored data found. Checking Obfuscator status...');
                    // Try decrypting first
                    if (typeof Obfuscator !== 'undefined') {
                        console.log('Obfuscator is defined. Attempting decryption...');
                        parsed = Obfuscator.decrypt(stored);
                        if (parsed) {
                            console.log('Decryption successful.');
                        } else {
                            console.warn('Decryption failed. Falling back to plain JSON parse.');
                        }
                    } else {
                        console.warn('Obfuscator is NOT defined. Attempting plain JSON parse.');
                    }
                    // Fallback to plain JSON if decryption failed or not ready
                    if (!parsed && stored.startsWith('{')) {
                        console.log('Attempting plain JSON parse...');
                        parsed = JSON.parse(stored);
                        if (parsed) {
                            console.log('Plain JSON parse successful.');
                        } else {
                            console.warn('Plain JSON parse failed.');
                        }
                    }
                } else {
                    console.log('No stored data found for V2.');
                }
            } catch (e) {
                console.error('Error loading V2 data:', e);
                parsed = null;
            }

            const base = {
                version: 2,
                visits: [],
                freezes: Number(localStorage.getItem('streakFreezes') || 0) || 0,
                usedFreezes: [],
                lastFreezeWeek: null,
                best: Number(localStorage.getItem('bestStreak') || 0) || 0,
                forgivenessData: {},
                checksum: null
            };

            if (!parsed || typeof parsed !== 'object') {
                console.log('No valid V2 data parsed. Returning base data.');
                return base;
            }

            let loadedData = {
                ...base,
                version: 2,
                visits: Array.isArray(parsed.visits) ? parsed.visits : base.visits,
                freezes: Number.isFinite(parsed.freezes) ? parsed.freezes : base.freezes,
                usedFreezes: Array.isArray(parsed.usedFreezes) ? parsed.usedFreezes : base.usedFreezes,
                lastFreezeWeek: typeof parsed.lastFreezeWeek === 'string' ? parsed.lastFreezeWeek : base.lastFreezeWeek,
                best: Number.isFinite(parsed.best) ? parsed.best : base.best,
                forgivenessData: (parsed.forgivenessData && typeof parsed.forgivenessData === 'object') ? parsed.forgivenessData : base.forgivenessData,
                checksum: parsed.checksum || null
            };

            if (!validateStreakData(loadedData)) {
                console.warn('Loaded V2 data failed validation. Clearing and returning base data.');
                localStorage.removeItem(STORAGE_KEY_V2);
                localStorage.removeItem('streakFreezes');
                localStorage.removeItem('bestStreak');
                return base;
            }
            console.log('V2 data loaded and validated successfully.');
            return loadedData;
        }

        function saveV2(data) {
            if (isRateLimited()) return;

            if (detectSuspiciousActivity(data)) {
                return;
            }

            if (!validateStreakData(data)) {
                return;
            }

            try {
                if (typeof Obfuscator !== 'undefined') {
                    const secure = Obfuscator.encrypt(data);
                    localStorage.setItem(STORAGE_KEY_V2, secure);
                } else {
                    localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(data));
                }
            } catch (e) {
                console.error('Save failed', e);
            }

            localStorage.setItem('streakFreezes', String(data.freezes));
            localStorage.setItem('bestStreak', String(data.best));
        }

        function migrateLegacyIntoV2(data) {
            const practiced = (() => {
                try {
                    return JSON.parse(localStorage.getItem('practicedDays') || '[]');
                } catch {
                    return [];
                }
            })();

            const used = (() => {
                try {
                    return JSON.parse(localStorage.getItem('usedFreezes') || '[]');
                } catch {
                    return [];
                }
            })();

            data.visits = mergeDayKeys(data.visits, practiced);
            data.usedFreezes = mergeDayKeys(data.usedFreezes, used);

            return data;
        }

        function recordVisit(data, date = new Date()) {
            const today = normalizeToNoon(date);
            const key = toDayKey(today);
            data.visits = mergeDayKeys(data.visits, key);

            if (today.getDay() === 1) {
                const weekKey = getWeekKey(today);
                console.log(`📅 Monday detected! Current week: ${weekKey}`);
                if (data.lastFreezeWeek !== weekKey) {
                    data.freezes = Math.max(0, Number(data.freezes) || 0) + 1;
                    data.lastFreezeWeek = weekKey;
                    console.log(`❄️ Monday bonus: +1 Freeze (Total: ${data.freezes})`);
                    if (typeof showToast !== 'undefined') showToast('Monday bonus: +1 Freeze');
                }
            }
            return data;
        }

        // Compute the set of used-freeze day keys that should be considered "valid"
        // for display and calendar rendering. This simulates the forward walk used
        // by `computeStreak` to ensure visual consistency.
        function computeEffectiveUsedSet(data, date = new Date()) {
            const today = normalizeToNoon(date);
            const todayKey = toDayKey(today);
            const visitsSet = new Set((data.visits || []).map(normalizeDayKey).filter(Boolean));
            const originalUsedSet = new Set((data.usedFreezes || []).map(normalizeDayKey).filter(Boolean));
            const allVisits = data.visits || [];
            if (allVisits.length === 0) return { set: new Set(), freezesNew: 0 };

            let earliestVisitStr = allVisits.reduce((min, v) => v < min ? v : min, allVisits[0]);
            let available = Math.max(0, Number(data.freezes) || 0);
            let freezesNew = 0;
            const effectiveUsed = new Set();
            for (const key of originalUsedSet) effectiveUsed.add(key);

            let cursor = new Date(today);
            cursor.setHours(12, 0, 0, 0);
            let pending = [];
            let foundBridge = false;

            while (getDayDiff(cursor, today) < 365) {
                const key = toDayKey(cursor);
                if (key < earliestVisitStr) break;

                const hasVisit = visitsSet.has(key);
                const isWeekend = cursor.getDay() === 0 || cursor.getDay() === 6;

                if (hasVisit || originalUsedSet.has(key)) {
                    foundBridge = true;
                    pending.forEach(p => {
                        effectiveUsed.add(p.key);
                        if (p.type === 'freeze') {
                            if (p.key < todayKey) freezesNew++;
                        }
                    });
                    pending = [];
                } else if (!isWeekend) {
                    if (available > 0) {
                        pending.push({ key: key, type: 'freeze' });
                        available--;
                    } else if (data.forgivenessData && data.forgivenessData[key]) {
                        pending.push({ key: key, type: 'forgiveness' });
                    } else {
                        break;
                    }
                    if (pending.length > 7) break;
                }

                cursor.setDate(cursor.getDate() - 1);
                cursor.setHours(12, 0, 0, 0);
            }
            return { set: effectiveUsed, freezesNew: freezesNew };
        }

        function computeStreak(data, date = new Date()) {
            const today = normalizeToNoon(date);
            const todayKey = toDayKey(today);
            const originalFreezes = Math.max(0, Number(data.freezes) || 0);

            const result = computeEffectiveUsedSet(data, today);
            const effectiveUsedSet = result.set;

            data.freezes = Math.max(0, originalFreezes - result.freezesNew);
            data.usedFreezes = Array.from(effectiveUsedSet).filter(k => k < todayKey).sort();

            let streak = 0;
            let streakActive = false;
            const visitsSet = new Set((data.visits || []).map(normalizeDayKey).filter(Boolean));
            const allVisits = data.visits || [];
            let earliestVisitStr = allVisits.length > 0 ? allVisits.reduce((min, v) => v < min ? v : min, allVisits[0]) : todayKey;

            let cursor = new Date(today);
            cursor.setHours(12, 0, 0, 0);

            while (true) {
                const key = toDayKey(cursor);
                if (key < earliestVisitStr) break;
                const isWeekend = cursor.getDay() === 0 || cursor.getDay() === 6;
                const hasVisit = visitsSet.has(key);
                const isSaved = effectiveUsedSet.has(key);

                if (hasVisit) {
                    streak++;
                    streakActive = true;
                } else if (isSaved && streakActive) {
                    streak++;
                } else if (!isWeekend && streakActive) {
                    break;
                }

                cursor.setDate(cursor.getDate() - 1);
                cursor.setHours(12, 0, 0, 0);
                if (getDayDiff(cursor, today) > 365) break;
            }

            data.best = Math.max(Number(data.best) || 0, streak);
            return { streak, data };
        }

            const res = computeStreak(data, new Date());
            return res.streak;

                for (i = 0, j = 0; i < 256; i++) {
                    j = (j + s[i] + key.charCodeAt(i % key.length)) % 256;
                    x = s[i];
                    s[i] = s[j];
                    s[j] = x;
                }

                // PRGA (Pseudo-Random Generation Algorithm)
                i = 0;
                j = 0;
                for (y = 0; y < str.length; y++) {
                    i = (i + 1) % 256;
                    j = (j + s[i]) % 256;
                    x = s[i];
                    s[i] = s[j];
                    s[j] = x;
                    res.push(String.fromCharCode(str.charCodeAt(y) ^ s[(s[i] + s[j]) % 256]));
                }
                return res.join("");
            }

            function djb2(str) {
                let hash = 5381;
                for (let i = 0; i < str.length; i++) {
                    hash = ((hash << 5) + hash) + str.charCodeAt(i);
                }
                return hash;
            }

            function generateSalt(length) {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                let salt = '';
                for (let i = 0; i < length; i++) {
                    salt += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return salt;
            }

            return {
                encrypt: (dataObj) => {
                    try {
                        const json = JSON.stringify(dataObj);
                        const checksum = djb2(json);
                        const payload = `${json}|${checksum}`;

                        // Generates a new random salt every time
                        const salt = generateSalt(4);
                        const key = BASE_KEY + salt;

                        const encrypted = rc4(key, payload);
                        // Prepend salt to the output so we can use it for decryption
                        return btoa(salt + encrypted);
                    } catch (e) { console.error('Encrypt failed', e); return null; }
                },
                decrypt: (base64Str) => {
                    try {
                        const raw = atob(base64Str);

                        // Extract the 4-char salt
                        const salt = raw.substring(0, 4);
                        const encrypted = raw.substring(4);

                        const key = BASE_KEY + salt;
                        const decrypted = rc4(key, encrypted);

                        const lastPipe = decrypted.lastIndexOf('|');
                        if (lastPipe === -1) throw new Error('Invalid payload format');

                        const json = decrypted.substring(0, lastPipe);
                        const storedChecksum = parseInt(decrypted.substring(lastPipe + 1));

                        if (djb2(json) !== storedChecksum) throw new Error('Checksum mismatch');

                        return JSON.parse(json);
                    } catch (e) {
                        console.error('Decrypt failed - Tampering output or format error', e);
                        return null;
                    }
                }
            };
        })();
    </script>
